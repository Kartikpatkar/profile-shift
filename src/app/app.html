<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ProfileShift</title>
    <link rel="stylesheet" href="./app.css" />
</head>

<body>
    <header class="topbar">
        <div>
            <div class="brand">ProfileShift</div>
            <div class="sub">Select a Profile → Permission Set</div>
        </div>
        <div class="topbarRight">
            <div class="authActions" id="authActions" hidden>
                <button class="topBtn" id="btnLoginProd" type="button">Login (Production)</button>
                <button class="topBtn" id="btnLoginSandbox" type="button">Login (Sandbox)</button>
            </div>

            <div class="menuWrap" id="orgMenuWrap" hidden>
                <button class="iconBtn" id="profileBtn" type="button" aria-label="Org menu" aria-haspopup="menu" aria-expanded="false">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
                        <path fill="currentColor"
                            d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.51 4.51 0 0 0 12 12Zm0 2.25c-4.08 0-7.5 2.04-7.5 4.5V21h15v-2.25c0-2.46-3.42-4.5-7.5-4.5Z" />
                    </svg>
                </button>

                <div class="menu" id="profileMenu" role="menu" hidden>
                    <div class="menuTitle">Connected org</div>
                    <div class="menuValue" id="menuOrgName">—</div>
                    <div class="menuActions">
                        <button class="menuBtn" id="btnSwitchOrg" type="button">Switch org</button>
                        <button class="menuBtn danger" id="btnLogout" type="button">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="splitRow">
            <section class="card cardPrimary">
                <div class="rowSplit">
                    <div class="field">
                        <label class="label" for="profileInput">Profile (search)</label>
                        <input id="profileInput" class="input" type="text" list="profilesList"
                            placeholder="Type to search profiles…" disabled />
                        <datalist id="profilesList"></datalist>
                        <!-- <div class="help">Type a profile name and pick from the list.</div> -->
                    </div>

                    <div class="field">
                        <label class="label" for="permissionSetName">Permission Set API Name</label>
                        <input id="permissionSetName" class="input" type="text" placeholder="e.g. Admin_Delta" disabled />
                        <!-- <div class="help">Used for export filename and deploy fullName.</div> -->
                    </div>
                </div>

                <div class="btnRow">
                    <button class="btn" id="btnConvert" disabled>Convert to Permission Set</button>
                    <button class="btn btn-secondary" id="btnExport" disabled>Export Permission Set XML</button>
                    <button class="btn btn-secondary" id="btnDeploy" disabled>Deploy via Metadata API</button>
                </div>
            </section>
        </div>

        <section class="card" id="editor" hidden>
            <div class="h">Edit Permissions</div>

            <div class="tabbar" id="tabBar" role="tablist" aria-label="Permission sections"></div>
            <div id="tabPanel" class="tabPanel"></div>
        </section>
    </main>

    <div class="modalOverlay" id="deployConfirm" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="deployConfirmTitle">
            <div class="modalTitle" id="deployConfirmTitle">Confirm deploy</div>

            <div class="modalMeta">
                <div class="modalMetaRow">
                    <div class="modalMetaKey">Org</div>
                    <div class="modalMetaVal" id="deployConfirmOrg">—</div>
                </div>
                <div class="modalMetaRow">
                    <div class="modalMetaKey">Permission Set Name</div>
                    <div class="modalMetaVal cellMono" id="deployConfirmPermSet">—</div>
                </div>
            </div>

            <div class="modalSummary" id="deployConfirmSummary"></div>

            <div class="modalFooter">
                <button class="btn btn-secondary" id="btnDeployCancel" type="button">Cancel</button>
                <button class="btn" id="btnDeployConfirm" type="button">Deploy</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toastContainer" aria-live="polite" aria-atomic="true"></div>

    <script src="../shared/toast.js"></script>
    <script src="./app.js" type="module"></script>
</body>

</html>
